name: CI/CD Vercel Production

on:
  # Executa o pipeline a cada push na branch principal
  push:
    branches:
      - main

# Evita deploys concorrentes da mesma branch
concurrency:
  group: deploy-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gate (Lint + Tests)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js LTS with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Python for backend tests
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/backend/requirements.txt

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm --workspace=apps/frontend run lint

      - name: Run frontend tests (if script exists)
        run: npm --workspace=apps/frontend run test --if-present

      - name: Install backend dependencies and quality tools
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/backend/requirements.txt
          pip install pytest ruff

      - name: Lint backend (ruff)
        run: ruff check apps/backend/src

      - name: Run backend tests (pytest)
        env:
          PYTHONPATH: apps/backend
        run: pytest apps/backend/src/test -v

  deploy-backend:
    name: Deploy Backend to Vercel (Production)
    runs-on: ubuntu-latest
    needs: quality
    # Defina este environment no GitHub para usar secrets isoladas por app
    environment: backend-production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js LTS with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment (backend)
        run: vercel pull --yes --environment=production --token=${{ env.VERCEL_TOKEN }} --cwd=apps/backend

      - name: Build backend artifacts
        run: vercel build --prod --token=${{ env.VERCEL_TOKEN }} --cwd=apps/backend

      - name: Deploy backend artifacts
        run: vercel deploy --prebuilt --prod --token=${{ env.VERCEL_TOKEN }} --cwd=apps/backend

  deploy-frontend:
    name: Deploy Frontend to Vercel (Production)
    runs-on: ubuntu-latest
    needs: quality
    # Defina este environment no GitHub para usar secrets isoladas por app
    environment: frontend-production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js LTS with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment (frontend)
        run: vercel pull --yes --environment=production --token=${{ env.VERCEL_TOKEN }} --cwd=apps/frontend

      - name: Build frontend artifacts
        run: vercel build --prod --token=${{ env.VERCEL_TOKEN }} --cwd=apps/frontend

      - name: Deploy frontend artifacts
        run: vercel deploy --prebuilt --prod --token=${{ env.VERCEL_TOKEN }} --cwd=apps/frontend


