name: CI/CD Vercel Production

on:
  # Executa o pipeline a cada push na branch principal
  push:
    branches:
      - main

# Evita deploys concorrentes da mesma branch
concurrency:
  group: deploy-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gate (Lint + Tests)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js LTS with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Python for backend tests
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/backend/requirements.txt

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm --workspace=apps/frontend run lint

      - name: Run frontend tests (if script exists)
        run: npm --workspace=apps/frontend run test --if-present

      - name: Install backend dependencies and quality tools
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/backend/requirements.txt
          pip install pytest ruff

      - name: Lint backend (ruff)
        run: ruff check apps/backend/src

      - name: Executar testes
        working-directory: apps/backend
        run: |
          export PYTHONPATH=src
          python -m pytest src/test --cov=src --cov-fail-under=70 --cov-report=html -v
      
      - name: Upload relatório de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: cobertura-html
          path: apps/backend/htmlcov

  deploy-backend:
    name: Deploy Backend to Vercel (Production)
    runs-on: ubuntu-latest
    needs: quality
    # Defina este environment no GitHub para usar secrets isoladas por app
    environment: backend-production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.BACKEND_VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js LTS with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Verify Vercel token access (backend)
        run: vercel whoami --token=${{ env.VERCEL_TOKEN }}

      - name: Validate required backend deploy secrets
        run: |
          required_vars=(
            "VERCEL_TOKEN"
            "VERCEL_ORG_ID"
            "VERCEL_PROJECT_ID"
          )

          for var in "${required_vars[@]}"; do
            if [ -z "${!var}" ]; then
              echo "::error::Missing required secret '$var' in GitHub Environment 'backend-production'."
              exit 1
            fi
          done

          if [[ "${VERCEL_ORG_ID}" != team_* ]]; then
            echo "::error::VERCEL_ORG_ID must start with 'team_' for team-scoped projects."
            exit 1
          fi

          if [[ "${VERCEL_PROJECT_ID}" != prj_* ]]; then
            echo "::error::BACKEND_VERCEL_PROJECT_ID must start with 'prj_'."
            exit 1
          fi

      - name: Normalize backend Vercel secrets
        run: |
          echo "VERCEL_TOKEN=$(printf '%s' "${VERCEL_TOKEN}" | tr -d '\r\n')" >> "$GITHUB_ENV"
          echo "VERCEL_ORG_ID=$(printf '%s' "${VERCEL_ORG_ID}" | tr -d '\r\n[:space:]')" >> "$GITHUB_ENV"
          echo "VERCEL_PROJECT_ID=$(printf '%s' "${VERCEL_PROJECT_ID}" | tr -d '\r\n[:space:]')" >> "$GITHUB_ENV"

      - name: Link backend project in CI
        run: |
          mkdir -p apps/backend/.vercel
          printf '{"orgId":"%s","projectId":"%s"}' "${VERCEL_ORG_ID}" "${VERCEL_PROJECT_ID}" > apps/backend/.vercel/project.json

      - name: Validate backend project access via Vercel API
        run: |
          api_url="https://api.vercel.com/v9/projects/${VERCEL_PROJECT_ID}"
          status_code=$(curl -sS -o /tmp/vercel_project_backend.json -w "%{http_code}" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            --get \
            --data-urlencode "teamId=${VERCEL_ORG_ID}" \
            "$api_url")

          if [ "$status_code" -ne 200 ]; then
            echo "::error::Vercel API access check failed for backend project. HTTP ${status_code}."
            echo "Response snippet:"
            head -c 500 /tmp/vercel_project_backend.json || true
            exit 1
          fi

      - name: Pull Vercel environment (backend)
        run: vercel pull --yes --environment=production --token=${{ env.VERCEL_TOKEN }} --cwd=apps/backend --debug

      - name: Build backend artifacts
        run: vercel build --prod --token=${{ env.VERCEL_TOKEN }} --cwd=apps/backend

      - name: Deploy backend artifacts
        run: vercel deploy --prebuilt --prod --token=${{ env.VERCEL_TOKEN }} --cwd=apps/backend

  deploy-frontend:
    name: Deploy Frontend to Vercel (Production)
    runs-on: ubuntu-latest
    needs: quality
    # Defina este environment no GitHub para usar secrets isoladas por app
    environment: frontend-production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.FRONTEND_VERCEL_PROJECT_ID }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js LTS with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Verify Vercel token access (frontend)
        run: vercel whoami --token=${{ env.VERCEL_TOKEN }}

      - name: Validate required frontend deploy secrets
        run: |
          required_vars=(
            "VERCEL_TOKEN"
            "VERCEL_ORG_ID"
            "VERCEL_PROJECT_ID"
            "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY"
            "CLERK_SECRET_KEY"
            "NEXT_PUBLIC_API_URL"
          )

          for var in "${required_vars[@]}"; do
            if [ -z "${!var}" ]; then
              echo "::error::Missing required secret '$var' in GitHub Environment 'frontend-production'."
              exit 1
            fi
          done

          if [[ "${VERCEL_ORG_ID}" != team_* ]]; then
            echo "::error::VERCEL_ORG_ID must start with 'team_' for team-scoped projects."
            exit 1
          fi

          if [[ "${VERCEL_PROJECT_ID}" != prj_* ]]; then
            echo "::error::FRONTEND_VERCEL_PROJECT_ID must start with 'prj_'."
            exit 1
          fi

      - name: Normalize frontend Vercel secrets
        run: |
          echo "VERCEL_TOKEN=$(printf '%s' "${VERCEL_TOKEN}" | tr -d '\r\n')" >> "$GITHUB_ENV"
          echo "VERCEL_ORG_ID=$(printf '%s' "${VERCEL_ORG_ID}" | tr -d '\r\n[:space:]')" >> "$GITHUB_ENV"
          echo "VERCEL_PROJECT_ID=$(printf '%s' "${VERCEL_PROJECT_ID}" | tr -d '\r\n[:space:]')" >> "$GITHUB_ENV"

      - name: Link frontend project in CI
        run: |
          mkdir -p apps/frontend/.vercel
          printf '{"orgId":"%s","projectId":"%s"}' "${VERCEL_ORG_ID}" "${VERCEL_PROJECT_ID}" > apps/frontend/.vercel/project.json

      - name: Pull Vercel environment (frontend)
        run: vercel pull --yes --environment=production --token=${{ env.VERCEL_TOKEN }} --debug

      - name: Build frontend artifacts
        run: vercel build --prod --token=${{ env.VERCEL_TOKEN }}

      - name: Deploy frontend artifacts
        run: vercel deploy --prebuilt --prod --token=${{ env.VERCEL_TOKEN }}


